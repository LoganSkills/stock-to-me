<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - Live Office Floor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow: auto;
            color: #fff;
        }
        .header {
            background: linear-gradient(180deg, #1a1a3a 0%, #0a0a1a 100%);
            padding: 15px 30px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0,255,136,0.5);
            letter-spacing: 3px;
        }
        .status-bar {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-indicator {
            background: #00ff88;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }
        .office-container {
            flex: 1;
            position: relative;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            overflow: hidden;
        }
        .office-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        .zone-label {
            position: absolute;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ffff;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }
        .zone-dev { top: 20px; left: 50px; }
        .zone-research { top: 20px; right: 50px; }
        .zone-ops { bottom: 120px; left: 50px; }
        .desk {
            position: absolute;
            width: 120px;
            height: 80px;
            background: linear-gradient(145deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid #3a3a5a;
            transition: all 0.3s;
        }
        .desk.active {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        .agent {
            position: absolute;
            width: 36px;
            height: 36px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }
        .agent svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px currentColor);
        }
        .agent:hover { transform: scale(1.2); }
        .agent.moving {
            z-index: 200;
            animation: bounce 0.5s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .status-active { color: #00ff88; }
        .status-idle { color: #ffaa00; }
        .status-busy { color: #ff4444; }
        .status-offline { color: #666; }
        .agent-label {
            position: absolute;
            font-size: 0.7rem;
            color: #aaa;
            background: rgba(0,0,0,0.8);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .meeting-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .meeting-table {
            width: 250px;
            height: 150px;
            background: linear-gradient(145deg, #2a2a4a 0%, #1a1a3a 100%);
            border-radius: 15px;
            border: 2px solid #3a3a5a;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .meeting-table.in-use {
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.2);
        }
        .meeting-table::before {
            content: 'CONFERENCE';
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: rgba(0,255,136,0.3);
        }
        .side-panel {
            width: 350px;
            background: #0f0f1a;
            border-left: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel-section {
            padding: 20px;
            border-bottom: 1px solid #1a1a3a;
        }
        .panel-section h3 {
            color: #00ff88;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        .task-list, .meeting-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .task-item, .meeting-item {
            background: #1a1a3a;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .task-item { border-left: 3px solid #00ff88; }
        .task-item.pending { border-left-color: #ffaa00; }
        .task-item.in-progress { border-left-color: #00ff88; }
        .task-title { color: #fff; margin-bottom: 4px; }
        .task-meta { color: #666; font-size: 0.75rem; }
        .meeting-type { color: #00ff88; font-size: 0.75rem; text-transform: uppercase; }
        .meeting-topic { color: #fff; margin: 4px 0; }
        .meeting-participants { color: #666; font-size: 0.75rem; }
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #1a1a3a;
            border: 1px solid #3a3a5a;
            color: #fff;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }
        .action-btn:hover {
            background: #2a2a4a;
            border-color: #00ff88;
            color: #00ff88;
        }
        .log-console {
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 15px;
            max-height: 200px;
        }
        .log-entry { margin-bottom: 5px; color: #888; }
        .log-entry.info { color: #00ff88; }
        .log-entry.warn { color: #ffaa00; }
        .log-entry.error { color: #ff4444; }
        .log-time { color: #4a4a6a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 MISSION CONTROL</h1>
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot" style="background: #00ff88;"></span>
                <span id="active-count">0 Active</span>
            </div>
            <div class="status-item">
                <span class="status-dot" style="background: #ffaa00;"></span>
                <span id="idle-count">0 Idle</span>
            </div>
            <div class="status-item">
                <span class="status-dot" style="background: #ff4444;"></span>
                <span id="busy-count">0 Busy</span>
            </div>
            <div class="live-indicator">● LIVE</div>
        </div>
    </div>
    
    <div class="main-container">
        <div class="office-container" id="office">
            <div class="zone-label zone-dev">Development</div>
            <div class="zone-label zone-research">Research</div>
            <div class="zone-label zone-ops">Operations</div>
            
            <div class="meeting-area">
                <div class="meeting-table" id="meeting-table"></div>
            </div>
        </div>
        
        <div class="side-panel">
            <div class="panel-section">
                <h3>📋 Active Tasks</h3>
                <div class="task-list" id="task-list">
                    <div class="task-item"><div class="task-title">Loading...</div></div>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>🤝 Active Meetings</h3>
                <div class="meeting-list" id="meeting-list">
                    <div class="meeting-item"><div class="meeting-topic">No active meetings</div></div>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>⚡ Quick Actions</h3>
                <div class="quick-actions">
                    <button class="action-btn" onclick="startTeamMeeting()">Team Meeting</button>
                    <button class="action-btn" onclick="createTask()">New Task</button>
                    <button class="action-btn" onclick="refreshData()">Refresh</button>
                </div>
            </div>
            
            <div class="panel-section">
                <h3>📜 System Log</h3>
                <div class="log-console" id="log-console">
                    <div class="log-entry"><span class="log-time">[--:--:--]</span> System initialized</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        let agents = {}, tasks = {}, meetings = {};
        let ws = null;
        
        const invaderSVG = `<svg viewBox="0 0 11 8"><path fill="currentColor" d="M1 0h1v1h1v1h2V1h1V0h1v1h1v1h1v1h-1v1h-1v1h-1V4H5v1H4v1H3V4H2V3H1V2H0V1h1V0zm2 6h1v1h1v1H4V7H3V6z"/></svg>`;
        
        // Default agent positions (will be overridden by API data)
        const defaultPositions = {
            alex: { x: 50, y: 60 },
            jordan: { x: 190, y: 60 },
            sam: { x: 1110, y: 60 },
            taylor: { x: 1270, y: 60 },
            morgan: { x: 50, y: 855 },
            casey: { x: 190, y: 855 },
            riley: { x: 630, y: 320 }
        };
        
        async function init() {
            log('Initializing Mission Control...', 'info');
            await loadState();
            renderOffice();
            connectWebSocket();
            setInterval(refreshData, 5000);
        }
        
        async function loadState() {
            try {
                const response = await fetch(`${API_BASE}/api/state`);
                const data = await response.json();
                agents = data.agents || {};
                tasks = data.tasks || {};
                meetings = data.meetings || {};
                updateStats();
                updateTaskList();
                updateMeetingList();
                log('State loaded', 'info');
            } catch (err) {
                log('Failed to load state: ' + err.message, 'error');
                // Use demo data if API fails
                loadDemoData();
            }
        }
        
        function loadDemoData() {
            agents = {
                alex: { id: 'alex', name: 'Alex', role: 'Senior Developer', department: 'Development', status: 'active', desk_x: 50, desk_y: 60, current_task: 'Building dashboard' },
                jordan: { id: 'jordan', name: 'Jordan', role: 'Code Reviewer', department: 'Development', status: 'active', desk_x: 190, desk_y: 60, current_task: 'Reviewing PRs' },
                sam: { id: 'sam', name: 'Sam', role: 'Research Lead', department: 'Research', status: 'active', desk_x: 1110, desk_y: 60, current_task: 'Researching sync options' },
                taylor: { id: 'taylor', name: 'Taylor', role: 'Data Analyst', department: 'Research', status: 'idle', desk_x: 1270, desk_y: 60, current_task: null },
                morgan: { id: 'morgan', name: 'Morgan', role: 'Tracker', department: 'Operations', status: 'idle', desk_x: 50, desk_y: 500, current_task: null },
                casey: { id: 'casey', name: 'Casey', role: 'Accountant', department: 'Operations', status: 'active', desk_x: 190, desk_y: 500, current_task: 'Cataloging subscriptions' },
                riley: { id: 'riley', name: 'Riley', role: 'Project Manager', department: 'Management', status: 'active', desk_x: 630, desk_y: 300, current_task: 'Overseeing setup' },
                watcher: { id: 'watcher', name: 'Watcher', role: 'Pipeline Monitor', department: 'Intelligence', status: 'active', desk_x: 1110, desk_y: 500, current_task: 'Monitoring jobs folder' }
            };
            updateStats();
            log('Using demo data', 'warn');
            
            // Load Watcher status from local file if available
            loadWatcherStatus();
        }
        
        function loadWatcherStatus() {
            // Try to load watcher_status.json from same folder
            fetch('watcher_status.json')
                .then(response => response.json())
                .then(data => {
                    if (data && agents.watcher) {
                        agents.watcher.current_task = `Found ${data.job_count || 0} jobs`;
                        agents.watcher.status = data.status || 'active';
                        updateStats();
                        log(`Watcher: ${data.job_count} jobs in pipeline`, 'info');
                    }
                })
                .catch(() => {
                    // No status file yet
                    if (agents.watcher) {
                        agents.watcher.current_task = 'Waiting for first scan';
                    }
                });
        }
        
        function connectWebSocket() {
            try {
                ws = new WebSocket(`ws://${window.location.host}/ws`);
                ws.onopen = () => log('WebSocket connected', 'info');
                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'state_update') {
                        agents = msg.data.agents || agents;
                        tasks = msg.data.tasks || tasks;
                        meetings = msg.data.meetings || meetings;
                        updateOffice();
                        updateStats();
                        updateTaskList();
                        updateMeetingList();
                    }
                };
                ws.onclose = () => {
                    log('WebSocket disconnected', 'warn');
                    setTimeout(connectWebSocket, 3000);
                };
            } catch (err) {
                log('WebSocket not available', 'warn');
            }
        }
        
        function renderOffice() {
            const office = document.getElementById('office');
            document.querySelectorAll('.desk, .agent, .agent-label').forEach(el => el.remove());
            
            Object.values(agents).forEach(agent => {
                const desk = document.createElement('div');
                desk.className = `desk desk-${agent.id}`;
                desk.style.left = agent.desk_x + 'px';
                desk.style.top = agent.desk_y + 'px';
                if (agent.status === 'busy') desk.classList.add('active');
                office.appendChild(desk);
                
                const agentEl = document.createElement('div');
                agentEl.className = `agent status-${agent.status}`;
                agentEl.id = `agent-${agent.id}`;
                agentEl.style.left = (agent.desk_x + 42) + 'px';
                agentEl.style.top = (agent.desk_y + 22) + 'px';
                agentEl.innerHTML = invaderSVG;
                agentEl.onclick = () => showAgentDetail(agent);
                office.appendChild(agentEl);
                
                const label = document.createElement('div');
                label.className = 'agent-label';
                label.style.left = (agent.desk_x + 10) + 'px';
                label.style.top = (agent.desk_y + 85) + 'px';
                label.textContent = `${agent.name} (${agent.role.split(' ')[0]})`;
                office.appendChild(label);
            });
        }
        
        function updateOffice() {
            Object.values(agents).forEach(agent => {
                const el = document.getElementById(`agent-${agent.id}`);
                if (el) {
                    el.className = `agent status-${agent.status}`;
                    const inMeeting = Object.values(meetings).some(m => m.participants.includes(agent.id));
                    if (inMeeting) {
                        moveToMeeting(agent.id);
                    } else {
                        returnToDesk(agent.id);
                    }
                }
                const desk = document.querySelector(`.desk-${agent.id}`);
                if (desk) desk.classList.toggle('active', agent.status === 'busy');
            });
            document.getElementById('meeting-table').classList.toggle('in-use', Object.keys(meetings).length > 0);
        }
        
        function moveToMeeting(agentId) {
            const el = document.getElementById(`agent-${agentId}`);
            const meeting = Object.values(meetings).find(m => m.participants.includes(agentId));
            if (!el || !meeting) return;
            const idx = meeting.participants.indexOf(agentId);
            const angle = (idx / meeting.participants.length) * 2 * Math.PI;
            const radius = 100;
            const centerX = window.innerWidth / 2 - 175;
            const centerY = window.innerHeight / 2 - 35;
            el.style.left = (centerX + Math.cos(angle) * radius) + 'px';
            el.style.top = (centerY + Math.sin(angle) * radius) + 'px';
            el.classList.add('moving');
        }
        
        function returnToDesk(agentId) {
            const el = document.getElementById(`agent-${agentId}`);
            const agent = agents[agentId];
            if (!el || !agent) return;
            el.style.left = (agent.desk_x + 42) + 'px';
            el.style.top = (agent.desk_y + 22) + 'px';
            el.classList.remove('moving');
        }
        
        function updateStats() {
            const counts = { active: 0, idle: 0, busy: 0 };
            Object.values(agents).forEach(a => { counts[a.status] = (counts[a.status] || 0) + 1; });
            document.getElementById('active-count').textContent = `${counts.active || 0} Active`;
            document.getElementById('idle-count').textContent = `${counts.idle || 0} Idle`;
            document.getElementById('busy-count').textContent = `${counts.busy || 0} Busy`;
        }
        
        function updateTaskList() {
            const list = document.getElementById('task-list');
            const taskArray = Object.values(tasks).sort((a, b) => (b.priority || 0) - (a.priority || 0));
            if (taskArray.length === 0) {
                list.innerHTML = '<div class="task-item"><div class="task-title">No active tasks</div></div>';
                return;
            }
            list.innerHTML = taskArray.map(task => `
                <div class="task-item ${task.status || 'pending'}">
                    <div class="task-title">${task.title}</div>
                    <div class="task-meta">${task.assigned_to ? '👤 ' + (agents[task.assigned_to]?.name || task.assigned_to) : 'Unassigned'} • ${task.status || 'pending'}</div>
                </div>
            `).join('');
        }
        
        function updateMeetingList() {
            const list = document.getElementById('meeting-list');
            const meetingArray = Object.values(meetings);
            if (meetingArray.length === 0) {
                list.innerHTML = '<div class="meeting-item"><div class="meeting-topic">No active meetings</div></div>';
                return;
            }
            list.innerHTML = meetingArray.map(m => `
                <div class="meeting-item">
                    <div class="meeting-type">${m.type}</div>
                    <div class="meeting-topic">${m.topic}</div>
                    <div class="meeting-participants">${m.participants.map(p => agents[p]?.name || p).join(', ')}</div>
                </div>
            `).join('');
        }
        
        function showAgentDetail(agent) {
            if (agent.id === 'watcher') {
                showWatcherPopup();
            } else {
                log(`Selected: ${agent.name} (${agent.role}) - ${agent.current_task || 'No task'}`, 'info');
            }
        }
        
        function showWatcherPopup() {
            // Fetch watcher status and show popup
            fetch('watcher_status.json')
                .then(response => response.json())
                .then(data => {
                    const popup = document.createElement('div');
                    popup.style.cssText = `
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        background: #1a1a3a;
                        border: 2px solid #00ff88;
                        border-radius: 10px;
                        padding: 30px;
                        color: #fff;
                        z-index: 10000;
                        min-width: 400px;
                        box-shadow: 0 0 50px rgba(0,255,136,0.3);
                    `;
                    
                    const lastScan = data.last_scan ? new Date(data.last_scan).toLocaleString() : 'Never';
                    const nextScan = data.next_scan || 'Tomorrow 8:00 AM';
                    
                    popup.innerHTML = `
                        <h2 style="color: #00ff88; margin-top: 0;">👁️ Watcher Status</h2>
                        <div style="margin: 20px 0;">
                            <div style="margin-bottom: 15px;">
                                <strong style="color: #4a4a6a;">Status:</strong> 
                                <span style="color: #00ff88; text-transform: uppercase;">${data.status || 'Active'}</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <strong style="color: #4a4a6a;">Jobs in Pipeline:</strong> 
                                <span style="font-size: 2em; color: #fff;">${data.job_count || 0}</span>
                            </div>
                            <div style="margin-bottom: 15px;">
                                <strong style="color: #4a4a6a;">Last Scan:</strong> ${lastScan}
                            </div>
                            <div style="margin-bottom: 15px;">
                                <strong style="color: #4a4a6a;">Next Scan:</strong> ${nextScan}
                            </div>
                            <div>
                                <strong style="color: #4a4a6a;">Watching:</strong> 
                                <span style="font-size: 0.8em; color: #888;">${data.watch_folder || 'JOBS BIDDING'}</span>
                            </div>
                        </div>
                        <button onclick="this.parentElement.remove(); document.getElementById('popup-overlay').remove();" 
                                style="background: #00ff88; color: #000; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
                            Close
                        </button>
                    `;
                    
                    // Add overlay
                    const overlay = document.createElement('div');
                    overlay.id = 'popup-overlay';
                    overlay.style.cssText = `
                        position: fixed;
                        top: 0; left: 0; right: 0; bottom: 0;
                        background: rgba(0,0,0,0.7);
                        z-index: 9999;
                    `;
                    overlay.onclick = () => {
                        popup.remove();
                        overlay.remove();
                    };
                    
                    document.body.appendChild(overlay);
                    document.body.appendChild(popup);
                })
                .catch(err => {
                    log('Watcher status not available yet', 'warn');
                    alert('Watcher has not run yet. Run watcher_agent.py first.');
                });
        }
        
        async function startTeamMeeting() {
            try {
                const participants = Object.keys(agents).slice(0, 4).join(',');
                await fetch(`${API_BASE}/api/meetings?meeting_type=team&participants=${participants}&location=conference&topic=Sprint Planning`, { method: 'POST' });
                log('Team meeting started', 'info');
            } catch (err) {
                log('Demo: Simulating team meeting', 'info');
                meetings['demo1'] = { id: 'demo1', type: 'team', participants: ['alex', 'jordan', 'sam', 'casey'], topic: 'Sprint Planning', location: 'conference' };
                updateOffice();
                updateMeetingList();
                setTimeout(() => {
                    delete meetings['demo1'];
                    updateOffice();
                    updateMeetingList();
                    log('Meeting ended', 'info');
                }, 5000);
            }
        }
        
        async function createTask() {
            const title = prompt('Task title:');
            if (!title) return;
            try {
                await fetch(`${API_BASE}/api/tasks?title=${encodeURIComponent(title)}&priority=1`, { method: 'POST' });
                log('Task created: ' + title, 'info');
            } catch (err) {
                log('Demo: Task "' + title + '" created', 'info');
                const id = 'task' + Date.now();
                tasks[id] = { id, title, status: 'pending', priority: 1 };
                updateTaskList();
            }
        }
        
        async function refreshData() {
            await loadState();
            renderOffice();
            log('Data refreshed', 'info');
        }
        
        function log(message, type = 'info') {
            const console = document.getElementById('log-console');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            console.appendChild(entry);
            console.scrollTop = console.scrollHeight;
        }
        
        init();
    </script>
</body>
</html>
